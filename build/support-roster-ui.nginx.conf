server {
    listen 80;
    server_name roster.example.com;

    root /var/www/support-roster-ui/current;
    index index.html;

    # Vite/Vue 单页应用 history 路由回退
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 当前示例用于“前端、后端不同域名/不同服务器”的部署方式。
    # 前端会直接请求 https://supportui.servier/api，
    # 因此前端服务器上的 Nginx 只需要托管静态文件，无需再配置 /api 反向代理。

    location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}

