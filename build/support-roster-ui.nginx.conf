server {
    listen 80;
    server_name roster.example.com;

    root /var/www/support-roster-ui/current;
    index index.html;

    # Vite/Vue 单页应用 history 路由回退
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 前后端同域部署：把 /api 代理到独立后端服务器
    location /api/ {
        proxy_pass http://10.0.0.25:8080/api/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 如果后端有 WebSocket，可按实际路径开启
    # location /ws/ {
    #     proxy_pass http://10.0.0.25:8080/ws/;
    #     proxy_http_version 1.1;
    #     proxy_set_header Upgrade $http_upgrade;
    #     proxy_set_header Connection "upgrade";
    #     proxy_set_header Host $host;
    # }

    location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}

